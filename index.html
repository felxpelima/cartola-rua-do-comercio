<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Liga Rua do Comercio · Copa do Mundo 2026</title>
  <meta name="description" content="Classificacao, rodada atual, premiacao e resenha da Liga Rua do Comercio no Cartola Copa 2026." />
  <meta name="theme-color" content="#040d09" />
  <meta name="color-scheme" content="dark" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Liga Rua do Comercio" />
  <meta property="og:description" content="Acompanhe a classificacao e a resenha da Copa do Mundo 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=round-rank-shot" />
</head>
<body>
  <div class="bg-grain"></div>
  <div class="bg-beams"></div>
  <div class="bg-pitch"><div class="circle"></div><div class="line"></div></div>

  <div class="wrap">
    <header class="hero hero-social">
      <div class="topbar">
        <span class="kicker">Liga oficial</span>
        <a class="lock-btn" href="/admin" title="Painel do organizador">Painel <span>Organizador</span></a>
      </div>

      <div class="trophy-orb">
        <div class="rays"></div>
        <div class="orb">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a3408" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
        </div>
      </div>

      <h1 class="title" id="titulo">Cartola Rua do Comercio</h1>
      <div class="subtitle-pill">
        <span class="live-dot"></span>
        <span id="subtitulo">Copa do Mundo 2026</span>
      </div>
      <div class="hero-rule"><span></span><i></i><span></span></div>
    </header>

    <main id="app">
      <section class="round-mural mural-card" id="roundMural" hidden>
        <span>Mensagem do organizador</span>
        <strong id="roundMuralText"></strong>
      </section>

      <nav class="tabbar" aria-label="Navegar pela liga">
        <button class="tab-btn active" type="button" data-tab="geral">Geral</button>
        <button class="tab-btn" type="button" data-tab="rodada">Rodada</button>
        <button class="tab-btn" type="button" data-tab="resenha">Resenha</button>
        <button class="tab-btn" type="button" data-tab="premios">Premiação</button>
      </nav>

      <section class="tab-panel active" data-panel="geral">
        <div class="section-head"><span class="sec-kicker">Classificacao</span><h2 class="sec-title">Ranking da liga</h2></div>
        <div class="podium" id="podium" style="display:none"></div>
        <div class="rank-list" id="lista"></div>
      </section>

      <section class="tab-panel" data-panel="rodada">
        <div class="section-head"><span class="sec-kicker">Rodada atual</span><h2 class="sec-title">Quem mitou</h2></div>
        <div class="round-actions">
          <button class="btn btn-gold" id="shareRoundBtn" type="button">Compartilhar resenha</button>
          <button class="btn btn-ghost" id="roundCardBtn" type="button">Compartilhar card</button>
          <span class="muted" id="roundShareNote"></span>
        </div>
        <div class="rank-list compact-list" id="roundList"></div>
      </section>

      <section class="tab-panel" data-panel="resenha">
        <div class="section-head"><span class="sec-kicker">Destaques</span><h2 class="sec-title">Resenha</h2></div>
        <div class="highlight-grid" id="highlights"></div>
        <div class="section-head tight"><span class="sec-kicker">Conquistas</span><h2 class="sec-title">Badges</h2></div>
        <div class="badge-grid" id="badgeList"></div>
      </section>

      <section class="tab-panel" data-panel="premios">
        <div class="section-head"><span class="sec-kicker">Premiação</span><h2 class="sec-title">Mundial</h2></div>
        <div class="pot-card glass">
          <div class="pot-label">Total em disputa</div>
          <div class="pot-value" id="total">R$ 0</div>
          <div class="pot-stats">
            <div class="chip"><span class="chip-k">Participantes</span><span class="chip-v" id="chipN">0</span></div>
            <div class="chip"><span class="chip-k">Por pessoa</span><span class="chip-v" id="chipValor">R$ 0</span></div>
          </div>
        </div>
        <div class="prize-grid" id="prizes"></div>
      </section>
    </main>

    <footer class="footer" id="footer">Atualizado pelo organizador</footer>
  </div>

  <button id="backToTop" class="back-to-top" type="button" aria-label="Voltar ao topo" title="Voltar ao topo" disabled>&uarr;</button>
  <script src="/back-to-top.js?v=back-top"></script>
  <script src="/landing.js?v=round-rank-shot-v2"></script>
</body>
</html>
