<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cartola Rua do Comércio · Copa do Mundo 2026</title>
  <meta name="description" content="Classificação ao vivo e premiação do bolão Cartola Rua do Comércio — Copa do Mundo 2026." />
  <meta name="theme-color" content="#040d09" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Cartola Rua do Comércio 🏆" />
  <meta property="og:description" content="Acompanhe a classificação e a premiação do bolão da Copa do Mundo 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-grain"></div>
  <div class="bg-beams"></div>
  <div class="bg-pitch"><div class="circle"></div><div class="line"></div></div>

  <div class="wrap">
    <header class="hero">
      <div class="topbar">
        <span class="kicker">Bolão Oficial</span>
        <a class="lock-btn" href="/admin" title="Painel do organizador">🔒 <span>Organizador</span></a>
      </div>

      <div class="trophy-orb">
        <div class="rays"></div>
        <div class="orb">
          <svg viewBox="0 0 24 24" fill="none" stroke="#4a3408" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
            <path d="M4 22h16" />
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" />
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
        </div>
      </div>

      <h1 class="title" id="titulo">Cartola Rua do Comércio</h1>

      <div class="subtitle-pill">
        <span class="live-dot"></span>
        <span id="subtitulo">Copa do Mundo 2026</span>
      </div>

      <div class="hero-rule"><span></span><i></i><span></span></div>
    </header>

    <main id="app">
      <!-- PREMIAÇÃO -->
      <section>
        <div class="section-head"><span class="sec-kicker">Premiação</span><h2 class="sec-title">O Bolão</h2></div>
        <div class="pot-card glass">
          <div class="pot-label">Total em disputa</div>
          <div class="pot-value" id="total">R$ 0</div>
          <div class="pot-stats">
            <div class="chip"><span class="chip-k">Participantes</span><span class="chip-v" id="chipN">0</span></div>
            <div class="chip"><span class="chip-k">Por pessoa</span><span class="chip-v" id="chipValor">R$ 0</span></div>
          </div>
        </div>
        <div class="prize-grid" id="prizes"></div>
      </section>

      <!-- CLASSIFICAÇÃO -->
      <section>
        <div class="section-head"><span class="sec-kicker">Classificação</span><h2 class="sec-title">O Pódio</h2></div>
        <div class="podium" id="podium" style="display:none"></div>
        <div class="rank-list" id="lista"></div>
      </section>
    </main>

    <footer class="footer" id="footer">Atualizado pelo organizador</footer>
  </div>

  <script src="/landing.js"></script>
</body>
</html>
